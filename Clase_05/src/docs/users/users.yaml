paths:
  /api/users:
    get:
      summary: Obtener todos los usuarios
      tags: [Users]
      responses:
        200:
          description: Lista de usuarios obtenida exitosamente
        500:
          description: Error al obtener la lista de usuarios
  /api/users/{uid}:
    get:
      summary: Obtener un usuario por ID
      tags: [Users]
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
          description: ID del usuario a obtener
      responses:
        200:
          description: Lista de usuarios obtenida exitosamente
        500:
          description: Error al obtener la lista de usuarios
    put:
      summary: Actualizar un usuario por ID
      tags: [Users]
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
          description: ID del usuario a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
        
      responses:
        200:
          description: Usuario actualizado exitosamente
        500:
          description: Error al actualizar el usuario


components:
  schemas:
    User:
      type: object
      properties:
        _id: 
          type: ObjectId
          description: ID autogenerado de MongoDB.
        first_name: 
          type: String
          description: Nombre del usuario.
        last_name: 
          type: String
          description: Apellido del usuario.
        email: 
          type: String
          description: email del usuario.
        password: 
          type: String
          description: password del usuario.
        role: 
          type: String
          description: role del usuario.
        pets:
          type: Array
          description: Arreglo de mascotas del usuario.
      example:
        _id: ObjectId("647fa8c9e46dbc5a20320181")
        first_name: Usuario de prueba 1
        last_name: Apellido de prueba 1
        email: correodeprueba1@gmail.com
        password: $2b$10$jo8EM4kblYt2BXI/K5t12OsScO6fTAgjlMFxLJVAnWO6xn4tmd7T2
  requestBodies:
    updateUser:
      type: object
      properties:
        first_name: 
          type: String
          description: Nombre del usuario.
        last_name: 
          type: String
          description: Apellido del usuario.
        email: 
          type: String
          description: email del usuario.
        password: 
          type: String
          description: password del usuario.
      example:
        first_name: Usuario de prueba 2
        last_name: Apellido de prueba 2
        email: correodeprueba1@gmail.com
        password: qwerty123
    